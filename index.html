<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Monedas del Mundo 🌍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --bg: #faf8ef;
            --board-bg: #bbada0;
            --tile-empty: #cdc1b4;
            --spawn-roulette-duration: 1400ms;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: #776e65;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            color: #776e65;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #776e65;
        }

        .scores {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .score-box {
            background: #bbada0;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            min-width: 110px;
            font-size: 1.1rem;
        }

        .score-box span {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
        }

        button {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        button:hover {
            background: #9c8a75;
            transform: scale(1.05);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: var(--board-bg);
            padding: 12px;
            border-radius: 16px;
            width: 400px;
            height: 400px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .cell {
            background: var(--tile-empty);
            border-radius: 8px;
            position: relative;
            aspect-ratio: 1 / 1;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 700;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .static-tile {
            position: absolute;
            inset: 0;
        }

        .moving-tile {
            position: absolute;
            pointer-events: none;
            will-change: transform;
            z-index: 3;
            transition: transform var(--move-duration, 300ms) cubic-bezier(0.22, 1, 0.36, 1);
        }

        .moving-tile.merge-source {
            z-index: 4;
        }

        .tile.spawn-roulette {
            z-index: 5;
            will-change: transform, opacity;
            animation: roulettePulse var(--spawn-roulette-duration) steps(6, end) forwards;
        }

        .tile.spawn-roulette .symbol,
        .tile.spawn-roulette .code {
            opacity: 0.92;
        }

        .tile.roulette-resolved {
            animation: rouletteResolve 140ms ease-out forwards;
        }

        .symbol {
            font-size: 42px;
            line-height: 1;
        }

        .code {
            font-size: 11px;
            font-weight: 500;
            margin-top: 4px;
            opacity: 0.85;
            letter-spacing: 1px;
        }

        /* === ANIMACIONES === */

        /* Nueva ficha: aparece desde cero con fade suave — distinta al impacto de fusión */
        .tile.new {
            animation: spawn 280ms cubic-bezier(0.17, 0.67, 0.35, 1.2) forwards;
        }

        @keyframes spawn {
            0%   { transform: scale(0);    opacity: 0; }
            60%  { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1);    opacity: 1; }
        }

        /* Fusión: pulso brusco con destello dorado — señala que algo cambió */
        .tile.merged {
            animation: burst 360ms ease forwards;
        }

        @keyframes burst {
            0%   { transform: scale(1);    box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
            30%  { transform: scale(1.32); box-shadow: 0 0 22px 7px rgba(255, 210, 0, 0.75); }
            65%  { transform: scale(0.94); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
            100% { transform: scale(1);    box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        }

        @keyframes roulettePulse {
            0% { transform: scale(0.92); filter: saturate(0.6); }
            50% { transform: scale(1.05); filter: saturate(1.3); }
            100% { transform: scale(1); filter: saturate(1); }
        }

        @keyframes rouletteResolve {
            0% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @media (max-width: 480px) {
            .board { width: 340px; height: 340px; }
            h1 { font-size: 2.4rem; }
            .tile.spawn-roulette .symbol { font-size: 34px; }
            .tile.spawn-roulette .code { font-size: 10px; letter-spacing: 0.5px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .tile.spawn-roulette,
            .tile.roulette-resolved,
            .moving-tile,
            .tile.new,
            .tile.merged {
                animation-duration: 1ms !important;
                transition-duration: 1ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048 <span style="color:#3dc28a;">Monedas del Mundo</span> 🌍</h1>
        <p class="subtitle">¡Combina monedas del planeta y llega a la Moneda Global!</p>

        <div class="scores">
            <div class="score-box">
                Puntuación
                <span id="score">0</span>
            </div>
            <div class="score-box">
                Mejor
                <span id="best">0</span>
            </div>
        </div>

        <button id="new-game">Nueva Partida</button>

        <div id="board" class="board"></div>

        <!-- Modales (sin cambios) -->
        <div id="win-modal" class="modal">
            <div class="modal-content">
                <h2>¡FELICIDADES! 🌍</h2>
                <p>¡Has creado la Moneda Global!<br>2048 = ¡Dominio mundial!</p>
                <button onclick="hideWinModal()">Seguir jugando</button>
                <button onclick="newGame()" style="background:#3dc28a;margin-top:10px;">Nueva Partida</button>
            </div>
        </div>

        <div id="lose-modal" class="modal">
            <div class="modal-content">
                <h2>¡Game Over!</h2>
                <p>¡No hay más movimientos!<br>Tu puntuación: <strong id="final-score">0</strong></p>
                <button onclick="newGame()">Jugar de nuevo</button>
            </div>
        </div>
    </div>

    <script src="src/game-state.js"></script>
    <script src="src/animation-state.js"></script>
    <script src="src/board-renderer.js"></script>
    <script>
        const currencies = {
            2:    { symbol: '💵', code: 'USD', color: '#eee4da', text: '#776e65' },
            4:    { symbol: '💶', code: 'EUR', color: '#ede0c8', text: '#776e65' },
            8:    { symbol: '💷', code: 'GBP', color: '#f2b179', text: '#f9f6f2' },
            16:   { symbol: '💴', code: 'JPY', color: '#f59563', text: '#f9f6f2' },
            32:   { symbol: '₹',  code: 'INR', color: '#f67c5f', text: '#f9f6f2' },
            64:   { symbol: '₽',  code: 'RUB', color: '#f65e3b', text: '#f9f6f2' },
            128:  { symbol: '₿',  code: 'BTC', color: '#edcf72', text: '#776e65' },
            256:  { symbol: '₩',  code: 'KRW', color: '#edcc61', text: '#776e65' },
            512:  { symbol: 'R$', code: 'BRL', color: '#9ed26e', text: '#776e65' },
            1024: { symbol: '¥',  code: 'CNY', color: '#8fd1a2', text: '#776e65' },
            2048: { symbol: '🌍', code: 'WORLD', color: '#3dc28a', text: '#f9f6f2' },
            4096: { symbol: '🚀', code: 'MOON', color: '#3dc28a', text: '#f9f6f2' }
        };

        const GameState2048 = window.GameState2048;
        const AnimationState2048 = window.AnimationState2048;
        const BoardRenderer2048 = window.BoardRenderer2048;

        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const winModal = document.getElementById('win-modal');
        const loseModal = document.getElementById('lose-modal');
        const animationDurationMs = 300;
        const spawnRouletteDurationMs = 1400;

        let board = GameState2048.createEmptyBoard(4);
        let score = 0;
        let bestScore = getBestScore();
        let hasWon = false;
        let animationState = AnimationState2048.createAnimationState({ durationMs: animationDurationMs });

        function getBestScore() {
            try {
                return Number(localStorage.getItem('world2048_best') || 0);
            } catch (error) {
                return 0;
            }
        }

        function persistBestScore(nextBestScore) {
            try {
                localStorage.setItem('world2048_best', String(nextBestScore));
            } catch (error) {
                return;
            }
        }

        function updateUI() {
            scoreEl.textContent = String(score);
            bestEl.textContent = String(bestScore);
        }

        function syncBestScore() {
            if (score > bestScore) {
                bestScore = score;
                persistBestScore(bestScore);
            }
        }

        function checkGameState() {
            if (GameState2048.hasWinningTile(board) && !hasWon) {
                hasWon = true;
                winModal.style.display = 'flex';
                return;
            }

            if (!GameState2048.hasAvailableMoves(board)) {
                document.getElementById('final-score').textContent = String(score);
                loseModal.style.display = 'flex';
            }
        }

        function renderStaticBoard(newPosition, mergedPositions) {
            BoardRenderer2048.renderBoard({
                boardEl,
                board,
                currencies,
                newPosition,
                mergedPositions
            });
        }

        function initGame() {
            const firstSpawn = GameState2048.spawnRandomTile(GameState2048.createEmptyBoard(4), Math.random);
            const secondSpawn = GameState2048.spawnRandomTile(firstSpawn.board, Math.random);

            board = secondSpawn.board;
            score = 0;
            hasWon = false;
            animationState = AnimationState2048.createAnimationState({ durationMs: animationDurationMs });
            winModal.style.display = 'none';
            loseModal.style.display = 'none';
            renderStaticBoard(secondSpawn.position, []);
            updateUI();
        }

        function hideWinModal() {
            winModal.style.display = 'none';
        }

        function move(direction) {
            let moveResult;
            let visualTransitions;
            let spawnEvent;

            if (!AnimationState2048.canAcceptInput(animationState)) {
                return;
            }

            moveResult = GameState2048.applyPlayerMove(board, direction, Math.random);

            if (!moveResult.changed) {
                return;
            }

            visualTransitions = AnimationState2048.buildVisualTransitions(moveResult, animationDurationMs);
            board = moveResult.board;
            score += moveResult.scoreDelta;
            syncBestScore();
            updateUI();
            animationState = AnimationState2048.beginMove(animationState, visualTransitions);
            spawnEvent = AnimationState2048.buildSpawnEvent(moveResult, animationState, {
                reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
                spawnDurationMs: spawnRouletteDurationMs
            });

            BoardRenderer2048.renderAnimatedMove({
                boardEl,
                finalBoard: board,
                currencies,
                transitions: visualTransitions,
                mergedPositions: moveResult.mergedPositions,
                newPosition: moveResult.spawnPosition,
                durationMs: animationDurationMs,
                spawnRoulette: spawnEvent,
                onMoveComplete: function () {
                    animationState = AnimationState2048.beginSpawn(animationState, spawnEvent);
                },
                onComplete: function () {
                    animationState = spawnEvent
                        ? AnimationState2048.completeSpawning(animationState)
                        : AnimationState2048.completeMove(animationState);
                    checkGameState();
                }
            });
        }

        document.addEventListener('keydown', function (event) {
            const directionMap = {
                ArrowLeft: 'left',
                ArrowRight: 'right',
                ArrowUp: 'up',
                ArrowDown: 'down'
            };
            const direction = directionMap[event.key];

            if (!direction) {
                return;
            }

            event.preventDefault();
            move(direction);
        });

        let touchStartX = 0;
        let touchStartY = 0;

        boardEl.addEventListener('touchstart', function (event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }, { passive: true });

        boardEl.addEventListener('touchend', function (event) {
            const deltaX = event.changedTouches[0].screenX - touchStartX;
            const deltaY = event.changedTouches[0].screenY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 40) {
                    move('right');
                } else if (deltaX < -40) {
                    move('left');
                }
                return;
            }

            if (deltaY > 40) {
                move('down');
            } else if (deltaY < -40) {
                move('up');
            }
        }, { passive: true });

        document.getElementById('new-game').addEventListener('click', initGame);
        window.hideWinModal = hideWinModal;
        window.newGame = initGame;

        initGame();
    </script>
</body>
</html>
